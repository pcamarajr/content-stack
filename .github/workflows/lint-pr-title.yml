name: lint-pr-title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Squash-merge: o título do PR vira o commit na main que o
          # release-please lê — o escopo deve ser o nome do plugin.
          scopes: |
            astro-builder
            astro-lsp
            content-image-gemini
            content-ops
            content-seo
            cost-tracker
            marketplace
            deps
          requireScope: false
